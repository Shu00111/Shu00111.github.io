        icon: fa-solid fa-code
        keywords: "Python, MATLAB, Jupyter Notebook, Git, GitHub, Markdown"

      - name: Robotics and Learning
        icon: fa-solid fa-robot
        keywords: "Robot learning, manipulability analysis, SPD manifolds, GMM, GMR, redundancy resolution"

      - name: Research Workflows
        icon: fa-solid fa-pen-to-square
        keywords: "Reproducible research, technical reporting, automation, Codex skills"
