cv:
  name: Yiwei Shu
  label: Ph.D. Student in Robotics
  email: shuyiwei24@mails.ucas.ac.cn
  location: Beijing, China
  image: ""
  summary: >
    Yiwei Shu is a Ph.D. student at the University of Chinese Academy of
    Sciences and the Technology and Engineering Center for Space Utilization,
    Chinese Academy of Sciences. His research focuses on autonomous robotic
    exploration, legged robots and field robotics, motion planning and online
    recovery, robot perception and SLAM, space and planetary robotics, and
    risk-aware planning and control. He is interested in overseas visiting Ph.D.
    opportunities and research collaborations in field and planetary robotics.

  social_networks:
    - network: GitHub
      username: Shu00111

  sections:
    Experience:
      - company: Technology and Engineering Center for Space Utilization, Chinese Academy of Sciences
        position: Ph.D. Student
        location: Beijing, China
        start_date: 2024
        end_date: present
        summary: >
          Research on autonomous robotic exploration for challenging and
          lunar-analogue environments, with emphasis on legged robots,
          perception-driven mapping, and robust motion planning.

    Education:
