    Publications:
      - title: Finite-State Visual Servo Control for Autonomous Target Landing of Low-Cost Underactuated Fixed-Wing Aircraft
        publisher: Under review, Aerospace Science and Technology
        summary: >
          Work on finite-state visual servo control for autonomous target
          landing of low-cost underactuated fixed-wing aircraft.

      - title: "From End-Effector Targets to Whole-Arm Postures: Configuration-Space Waypoint Recovery for Reactive Manipulation"
        publisher: Submitted to IEEE Robotics and Automation Letters
        summary: >
          Work on configuration-space waypoint recovery for reactive
          manipulation from end-effector targets to whole-arm postures.

      - title: Attitude Control of Unpowered Aircraft in Flight Based on Kalman Filter Visual Servo-PID Optimization Algorithm
        publisher: CCC 2026, oral presentation accepted
        releaseDate: 2026
        summary: >
          Work on visual-servo-based attitude control for unpowered aircraft
          using Kalman filtering and PID optimization.

      - title: "Expanding Grasp Reachability: Field-based Pose-constrained Two-stage Grasp Planning"
        publisher: ICoSR 2026, oral presentation accepted
        releaseDate: 2026
        summary: >
          Work on pose-constrained two-stage grasp planning for expanding
          grasp reachability.

      - title: "Learning-based Extended-workspace Manipulation: A Self-relocating Space Crawler for Autonomous Deep-space Outposts"
        publisher: COSPAR 2026, poster accepted
        releaseDate: 2026
        summary: >
          Work on learning-based extended-workspace manipulation for a
          self-relocating space crawler in autonomous deep-space outpost
          scenarios.

    Projects:
      - name: Unitree Go2 Autonomous Exploration for Lunar-Analogue Environments
        summary: >
          Autonomous exploration system for a Unitree Go2 quadruped robot using
          LiDAR, depth cameras, and grid-based mapping in lunar-analogue
          environments.
        highlights:
          - Develop perception and mapping pipelines that combine LiDAR and depth camera observations.
          - Build grid-based environmental representations for exploration and navigation.
          - Study motion planning and online recovery strategies for legged robots in uneven, uncertain terrain.

      - name: Reactive Manipulation and Waypoint Recovery
        summary: >
          Research on recovering whole-arm robot postures from end-effector
          targets for reactive manipulation in constrained environments.
        highlights:
          - Connect end-effector task goals with configuration-space waypoint generation.
          - Improve manipulation robustness under changing targets and constraints.

      - name: Autonomous Landing and Visual Servo Control
        summary: >
          Research on visual servo control and attitude control for autonomous
          aircraft landing and flight stabilization.
        highlights:
          - Design finite-state control strategies for target landing.
          - Combine visual servoing, Kalman filtering, and PID optimization for low-cost aircraft autonomy.

