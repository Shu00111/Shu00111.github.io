  summary: >
    Yiwei Shu works at the intersection of robotics, machine learning, and
    research tooling. Current interests include robot manipulability transfer,
    learning on SPD manifolds, probabilistic modeling, and practical tools that
    help researchers turn technical activity into clear written outputs.

