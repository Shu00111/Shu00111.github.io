  sections:
    Academic Interests:
      - name: Robotics and Robot Learning
        icon: fa-solid fa-robot
        keywords: "Manipulability transfer, SPD manifolds, probabilistic modeling, redundancy resolution"

      - name: Research Automation
        icon: fa-solid fa-pen-to-square
        keywords: "Technical reporting, reproducible workflows, Codex skills, GitHub activity summaries"

    Projects:
      - name: Manipulability Transfer Reproduction
        url: https://github.com/Shu00111
        summary: >
          MATLAB reproduction scaffold for robot manipulability transfer using
          SPD-manifold learning and redundancy resolution.
        highlights:
          - Implemented reusable modules for SPD logarithm/exponential maps, parallel transport, and Stein divergence.
          - Added GMM/GMR learning code specialized to time-conditioned 2x2 SPD manipulability matrices.
          - Included a runnable demo pipeline for generating demonstrations and reproducing learned manipulability profiles.

      - name: GitHub Weekly Report Skill
        url: https://github.com/Shu00111/Github-Weekly-Report-Skill
        summary: >
          A Codex/Claude skill that turns GitHub or local git activity into a
          structured Markdown weekly report.
        highlights:
          - Groups commits into meaningful repositories and workstreams.
          - Produces progress, problems, next plans, discussion points, daily notes, and workload summaries.

      - name: Office Skills
        url: https://github.com/Shu00111/Office-Skills
        summary: >
          Public Codex skills for office, research, and administrative workflows.
        highlights:
          - Includes reimbursement material organization from receipts, payment screenshots, invoices, and item photos.
          - Packages reusable workflow skills with scripts and installation instructions.

      - name: UCAS Notes
        url: https://github.com/Shu00111/UCAS-Notes
        summary: Course notes for UCAS coursework.

      - name: STAT107 Micro Project
        url: https://github.com/Shu00111/STAT107MicroProject
        summary: Public Jupyter Notebook project repository.

    Skills:
