    Manuscripts Under Review and Submitted:
      - title: Finite-State Visual Servo Control for Autonomous Target Landing of Low-Cost Underactuated Fixed-Wing Aircraft
        authors:
          - "**Yiwei Shu**"
          - Shuquan Wang
        journal: Manuscript under review at Aerospace Science and Technology
        date: 2026-06
        summary: >
          **Yiwei Shu**, Shuquan Wang.
          1. Developed a finite-state visual servo controller that switches from IMU-guided ascent to monocular vision-guided descent, enabling autonomous target landing under limited sensing and weak control authority.
          2. Independently designed, fabricated, and integrated the complete hardware testbed, including a 189 g underactuated fixed-wing aircraft, onboard electronics and actuation, and an adjustable catapult launcher. The aircraft cost only CNY 534 and required no GPS, airspeed sensor, or high-grade INS.
          3. Validated the system through CFD-informed randomized simulations and real-world flight tests. Compared with a sliding-mode control baseline, it reduced final radial error by 99.5% and RMS error by 88.1%, while achieving a 100% landing success rate (20/20) versus 75% (15/20).

      - title: "From End-Effector Targets to Whole-Arm Postures: Configuration-Space Waypoint Recovery for Reactive Manipulation"
        authors:
          - "**Yiwei Shu**"
          - Shuquan Wang
        journal: Manuscript under review at IEEE Robotics and Automation Letters
        date: 2026-05
        summary: >
          **Yiwei Shu**, Shuquan Wang.
          1. Developed PostureWaypoint, a configuration-space recovery method that lifts Cartesian bypass targets into collision-free, joint-feasible whole-arm postures, eliminating posture ambiguity without global replanning or task-specific training.
          2. Built an event-triggered framework integrating geometric-SDF bypass generation, SQP-based posture synthesis, posture-guided reactive control, and progress-preserving CBF filtering, running at 50 Hz with only 2.73 ms computation per step.
          3. Evaluated the method on four manipulators and six constrained 3D tasks with 1,200 randomized episodes per method, achieving the highest mean whole-arm success rate of 70.2% (+5.5 percentage points over the best baseline). RM75 hardware tests achieved 100% success (20/20) in both real-robot tasks.

      - title: "RKILPlanner: Risk-based Kinematic Imitation Learning Planning Towards Human-Like Driving in Highway Scenarios"
        authors:
          - "**Yiwei Shu**"
          - Shuquan Wang
          - Jun Li
        journal: Manuscript submitted to ROBIO 2026
        date: 2026
        summary: >
          **Yiwei Shu**, Shuquan Wang, Jun Li.
          1. Developed RKILPlanner, a risk-aware kinematic imitation learning framework that unifies Driver's Risk Fields (DRF), personalized driving styles, and vehicle kinematics for human-like highway trajectory planning over a safety-critical 2.5 s horizon.
          2. Built a three-branch end-to-end architecture that encodes 1 s trajectory histories with an LSTM, extracts local risk features with a CNN, and incorporates a five-dimensional driver-style vector. A differentiable kinematic layer converts acceleration and yaw-rate commands into smooth, physically feasible trajectories without post-processing.
          3. Evaluated on 28,641 HighD samples, achieving an ADE of 0.159 m, FDE of 0.443 m, and a 0.3% miss rate. Compared with constant-velocity and Vanilla LSTM baselines, RKILPlanner reduced ADE by 23.7% and 65.8%, FDE by 23.1% and 40.4%, and the miss rate from 4.2% to 0.3%.

    Publications and Presentations:
      - title: "Expanding Grasp Reachability: Field-based Pose-constrained Two-stage Grasp Planning"
        authors:
          - "**Yiwei Shu**"
          - Shuquan Wang
          - Jun Li
          - Hanying Sang
          - Yidong Ye
        journal: ICoSR 2026, oral presentation
        date: 2026-07
        summary: >
          **Yiwei Shu**, Shuquan Wang, Jun Li, Hanying Sang, and Yidong Ye.
          1. Developed a field-based pose-constrained grasp planner that models physical reachability, pose-constrained reachability, and pose-aware manipulability from robot kinematics to identify low-dexterity regions near workspace boundaries.
          2. Designed a human-inspired two-stage policy that directly grasps feasible targets and otherwise sweeps objects into high-manipulability regions before constrained pickup. Offline field construction enables lightweight online queries and sweep-target selection.
          3. Validated on a 7-DoF RM75 in simulation and hardware. The method achieved 27/30 boundary grasps versus 0/30 for direct picking, maintained 20/20 success in central regions, and expanded the real-world pose-constrained grasp radius by 50%, from 0.38 m to 0.57 m, without sim-to-real modification.

      - title: "Learning-based Extended-workspace Manipulation: A Self-relocating Space Crawler for Autonomous Deep-space Outposts"
        authors:
          - "**Yiwei Shu**"
          - Shuquan Wang
        journal: 46th COSPAR Scientific Assembly 2026, poster presentation
        date: 2026
        summary: >
          **Yiwei Shu**, Shuquan Wang. Poster presentation at the *46th COSPAR
          Scientific Assembly 2026*. Proposed a passive-rail, self-relocating
          space crawler and hierarchical reinforcement-learning framework for
          autonomous extended-workspace manipulation in deep-space outposts.

      - title: Attitude Control of Unpowered Aircraft in Flight Based on Kalman Filter Visual Servo-PID Optimization Algorithm
        authors:
          - "**Yiwei Shu**"
          - Shuquan Wang
        journal: 44th Chinese Control Conference (CCC 2025), oral presentation
        date: 2025-07
        summary: >
          **Yiwei Shu**, Shuquan Wang.
          1. Developed a Kalman-filtered visual servo-PID controller for low-cost unpowered aircraft, enabling pitch-yaw regulation, trajectory correction, and precision landing under noisy conditions.
          2. Designed a monocular-camera-only control pipeline that filters image-plane errors, adaptively tunes PID gains and noise covariances, and optimizes control parameters through a trajectory loss function, eliminating the need for GPS, IMUs, or high-cost navigation sensors.
          3. Achieved the lowest average trajectory error of 1.3650 under Gaussian noise, reducing error by 48.4% versus sliding-mode control and 41.1% versus standard visual servoing, with smoother convergence, lower steady-state error and overshoot, and improved noise robustness.

    Projects:
      - name: Time-Efficient Multi-Gait Lunar Navigation for Unitree Go2
        start_date: 2026
        end_date: present
        summary: Developing a goal-directed SLAM and adaptive locomotion framework for fast, reliable quadruped navigation across GPS-denied lunar terrain.
        highlights:
          - Integrate Livox Mid-360 LiDAR-inertial odometry, occupancy-grid mapping, and point-goal planning to navigate the Unitree Go2 toward specified lunar targets.
          - Design a hybrid locomotion planner that switches between walking and jumping based on terrain traversability, shortcut gain, and execution risk, minimizing time-to-goal across craters, gaps, and ridges.
          - Build 0.16g Isaac Lab lunar-terrain benchmarks and gait-conditioned world models to predict traversal cost, observation gain, and localization drift, evaluating time-to-goal, path length, success rate, and sim-to-real robustness.

