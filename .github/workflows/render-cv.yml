name: Render a CV
on:
  push:
    branches:
      - main
      - master
    paths:
      - "_data/cv_pdf.yml"
      - "assets/rendercv/design.yaml"
      - "assets/rendercv/locale.yaml"
      - "assets/rendercv/settings.yaml"
  workflow_call:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  rendercv:
    if: github.repository == 'Shu00111/Shu00111.github.io'
    name: RenderCV
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Preserve an explicitly supplied PDF
        id: render_source
        shell: bash
        run: |
          render=true
          if [ "${{ github.event_name }}" = "push" ] && \
             git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" -- | \
               grep -Fxq "assets/rendercv/rendercv_output/Yiwei_Shu_CV.pdf"; then
            render=false
            echo "The pushed PDF is authoritative; skipping automatic regeneration."
          fi
          echo "render=$render" >> "$GITHUB_OUTPUT"
      - uses: actions/setup-python@v5
        if: steps.render_source.outputs.render == 'true'
        with:
          python-version: "3.12"
      - name: Install RenderCV
        if: steps.render_source.outputs.render == 'true'
        run: |
          pip install -r requirements.txt
      - name: RenderCV
        if: steps.render_source.outputs.render == 'true'
        run: |
          cv_file="_data/cv_pdf.yml"
          if [ ! -f "$cv_file" ]; then
            echo "No PDF CV source found at $cv_file!"
            exit 1
          fi
          rendercv_dir=$(find assets -maxdepth 1 -type d -name "rendercv")
          if [ -z "$rendercv_dir" ]; then
            echo "No RenderCV config directory found!"
            exit 1
          fi
          settings=$(find $rendercv_dir -maxdepth 1 -type f \( -name "settings.yaml" -o -name "settings.yml" \))
          if [ -z "$settings" ]; then
            echo "Missing RenderCV config file!"
            exit 1
          fi
          rendercv render $cv_file \
            --design assets/rendercv/design.yaml \
            --locale-catalog assets/rendercv/locale.yaml \
            --settings $settings
          rm -f assets/rendercv/rendercv_output/*.typ
      - name: Upload rendercv_output as an artifact
        uses: actions/upload-artifact@v4
        with:
          name: RenderCV Output
          path: assets/rendercv/rendercv_output
      - name: Push the changes
        run: |
          git config --global user.name "${{ github.actor }}"
          git config --global user.email "${{ github.actor }}@users.noreply.github.com"
          git add -A assets/rendercv/rendercv_output
          if ! git diff --cached --quiet; then
            git commit -m "chore: render the latest CV"
            git push
          fi
