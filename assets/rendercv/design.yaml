# for more options, see https://docs.rendercv.com/user_guide/yaml_input_structure/design/
design:
  theme: classic
  page:
    size: a4
    top_margin: 0.5in
    bottom_margin: 0.5in
    left_margin: 0.55in
    right_margin: 0.55in
    show_footer: false
    show_top_note: false
  typography:
    line_spacing: 0.55em
    font_size:
      body: 9.5pt
      name: 28pt
      headline: 9.5pt
      connections: 9.5pt
      section_titles: 1.3em
  header:
    space_below_name: 0.35cm
    space_below_headline: 0.35cm
    space_below_connections: 0.35cm
  section_titles:
    space_above: 0.35cm
    space_below: 0.2cm
  sections:
    space_between_regular_entries: 0.75em
    space_between_text_based_entries: 0.2em
    show_time_spans_in: []
  entries:
    date_and_location_width: 3.8cm
    degree_width: 1.7cm
    side_space: 0.15cm
    space_between_columns: 0.1cm
    highlights:
      space_left: 0.12cm
      space_between_bullet_and_text: 0.4em
  templates:
    publication_entry:
      main_column: |-
        **TITLE**
        SUMMARY
      date_and_location_column: DATE
