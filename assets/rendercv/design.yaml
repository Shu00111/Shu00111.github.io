# PDF design distilled from docs/YiweiShuCV_V3.docx.
design:
  theme: classic
  page:
    size: us-letter
    top_margin: 0.7in
    bottom_margin: 0.7in
    left_margin: 0.75in
    right_margin: 0.75in
    show_footer: false
    show_top_note: false
  colors:
    body: rgb(0, 0, 0)
    name: rgb(0, 0, 0)
    headline: rgb(0, 0, 0)
    connections: rgb(0, 0, 0)
    section_titles: rgb(0, 0, 0)
    links: rgb(0, 0, 0)
  typography:
    alignment: left
    date_and_location_column_alignment: right
    line_spacing: 0.55em
    font_family: XCharter
    font_size:
      body: 10pt
      name: 20pt
      headline: 10pt
      connections: 10pt
      section_titles: 1.25em
    bold:
      name: false
      headline: false
      connections: false
      section_titles: true
  links:
    underline: false
    show_external_link_icon: false
  header:
    alignment: center
    space_below_name: 0.15cm
    space_below_headline: 0.12cm
    space_below_connections: 0.4cm
    connections:
      show_icons: false
      display_urls_instead_of_usernames: false
      separator: "|"
      space_between_connections: 0.18cm
  section_titles:
    type: without_line
    space_above: 0.38cm
    space_below: 0.15cm
  sections:
    allow_page_break: true
    space_between_regular_entries: 0.6em
    space_between_text_based_entries: 0.1em
    show_time_spans_in: []
  entries:
    date_and_location_width: 3.8cm
    degree_width: 0cm
    side_space: 0cm
    space_between_columns: 0.15cm
    allow_page_break: false
    short_second_row: false
    summary:
      space_above: 0cm
      space_left: 0cm
    highlights:
      bullet: ●
      nested_bullet: ●
      space_left: 0.12cm
      space_above: 0.02cm
      space_between_items: 0.02cm
      space_between_bullet_and_text: 0.35em
  templates:
    time_span: ""
    single_date: MONTH_ABBREVIATION YEAR
    date_range: START_DATE – END_DATE
    education_entry:
      main_column: |-
        **INSTITUTION**, LOCATION
        *PROGRAM*
        HIGHLIGHTS
      degree_column: null
      date_and_location_column: DATE
    normal_entry:
      main_column: |-
        ***NAME***
        SUMMARY
        HIGHLIGHTS
      date_and_location_column: DATE
    experience_entry:
      main_column: |-
        ***COMPANY***
        ***POSITION***
        HIGHLIGHTS
      date_and_location_column: DATE
    publication_entry:
      main_column: |-
        ***TITLE***
        AUTHORS. *JOURNAL*.
      date_and_location_column: DATE
